services:
  wav2vec2-train:
    build:
      context: .
      dockerfile: Dockerfile
    image: wav2vec2-vi:latest
    container_name: wav2vec2-train
    volumes:
      - /mnt/12bc61a2-ddc5-4be8-b8be-bbd99dc6d141/AI engineer/Personal Project /Testing/Extract-vi-name-wav2vec2-toolkit/data_train_70.6:/app/data/train
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./train_wav2vec2.py:/app/train_wav2vec2.py
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command: >
      python train_wav2vec2.py --extracted_dir /app/data/train --meta_csv /app/data/train/metadata.csv --output_dir /app/models/wav2vec2-finetuned --per_device_train_batch_size 2 --gradient_accumulation_steps 16 --num_train_epochs 30 --learning_rate 1e-5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - wav2vec2-net

  wav2vec2-eval:
    build:
      context: .
      dockerfile: Dockerfile
    image: wav2vec2-vi:latest
    container_name: wav2vec2-eval
    volumes:
      - /mnt/12bc61a2-ddc5-4be8-b8be-bbd99dc6d141/AI engineer/Personal Project /Testing/Extract-vi-name-wav2vec2-toolkit/person_name_500:/app/data/eval
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./eval_wav2vec2.py:/app/eval_wav2vec2.py
    command: >
      python eval_wav2vec2.py --wav_dir /app/data/eval --model_dir /app/models/wav2vec2-finetuned --local_weights /app/models/wav2vec2-finetuned/model.safetensors --out_save_dir /app/outputs --run_postprocess
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - wav2vec2-net
    depends_on:
      - wav2vec2-train

networks:
  wav2vec2-net:
    driver: bridge

volumes:
  models:
  outputs:
